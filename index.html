<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="./style.css">
    <title>Rock | Paper | Scissors</title>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1 class="title">Rock | Paper | Scissors</h1>
        </div>
        <div class="choice">
            <h2 class="subtitle">Choose your fighter</h2>
            <button id="rock">🪨</button>
            <button id="paper">🧻</button>
            <button id="scissors">✂️</button>
        </div>
        <div class="result">
            <p class="result__round-number">Ready to start?</p>
            <p class="result__score">Player : 0 | 0 : Computer</p>
        </div>
        <div class="restart">
            <button id="restart__button">Start over</button>
        </div>
    </div>
</body>
</html>
